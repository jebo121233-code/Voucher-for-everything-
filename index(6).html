<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher For Everything</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#fff7ed,#ffffff,#fff3e0);
}

.container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.4);
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.logo{
    width:220px;
    max-width:90%;
    height:auto;
    display:block;
    margin:auto;
    margin-bottom:15px;
}

.title{
    font-size:30px;
    font-weight:700;
    color:#ff8c00;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    color:white;
    padding:16px;
    margin:12px 0;
    border-radius:18px;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.website{
    background:#ff8c00;
}

.facebook{
    background:#1877F2;
}

.instagram{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.tiktok{
    background:#000000;
}

.whatsapp{
    background:#25D366;
}

.btn i{
    font-size:20px;
}

#qrcode{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

.footer{
    margin-top:15px;
    color:#888;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.jpg" class="logo" alt="Voucher For Everything">

    <!-- TITLE -->
    <div class="title">#Be_Special #خليك_مميز خصومتك كلها عندنا </div>
    <div class="subtitle">Offers, Discounts & Exclusive Deals</div>

    <!-- OFFERS LINK -->
    <a class="btn website"
       href="https://voucher-everything.netlify.app/"
       target="_blank">
       <i class="fa-solid fa-tags"></i>
       Offers Link
    </a>

    <!-- FACEBOOK -->
    <a class="btn facebook"
       href="https://www.facebook.com/share/17xh8WvqXE/"
       target="_blank">
       <i class="fab fa-facebook-f"></i>
       Facebook
    </a>

    <!-- INSTAGRAM -->
    <a class="btn instagram"
       href="https://www.instagram.com/ve_card1?igsh=MXB6c3MwbWdlYXdhbA=="
       target="_blank">
       <i class="fab fa-instagram"></i>
       Instagram
    </a>

    <!-- TIKTOK -->
    <a class="btn tiktok"
       href="https://www.tiktok.com/@vouchers.ve?_r=1&_t=ZS-94kF7bt768e"
       target="_blank">
       <i class="fab fa-tiktok"></i>
       TikTok
    </a>

    <!-- WHATSAPP -->
    <a class="btn whatsapp"
       href="https://wa.me/201025311724"
       target="_blank">
       <i class="fab fa-whatsapp"></i>
       WhatsApp
    </a>

    <!-- QR CODE -->
    <div id="qrcode"></div>

    <div class="footer">
        Scan QR Code To Open This Page
    </div>

</div>

<script>

new QRCode(document.getElementById("qrcode"),{
    text:window.location.href,
    width:180,
    height:180
});

</script>

</body>
</html>
